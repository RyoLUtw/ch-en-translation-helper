<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中譯英輔助小工具</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-soft: #fafbff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
      --subject: #dbeafe;
      --verb: #fee2e2;
      --object: #dcfce7;
      --modifier: #fef3c7;
      --selection: #c7d2fe;
      --selection-anchor: #fde68a;
      --tab: #eef2ff;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --editor-height-collapsed: 112px;
      --editor-height-expanded: 300px;
      --editor-height: var(--editor-height-expanded);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body.editor-collapsed {
      --editor-height: var(--editor-height-collapsed);
    }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 24px calc(var(--editor-height) + 40px);
      display: grid;
      gap: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    h1, h2, h3, h4, p { margin-top: 0; }

    .muted {
      color: var(--muted);
      line-height: 1.65;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      font-size: 18px;
      line-height: 1.7;
      font-family: inherit;
      background: #fff;
    }

    .top-controls,
    .step-actions,
    .floating-editor-actions,
    .clause-actions,
    .page-actions,
    .inline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
      align-items: center;
    }

    button {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-family: inherit;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: #9ca3af;
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.08);
    }

    button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    button.primary:hover {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
    }

    button:disabled {
      cursor: not-allowed;
      background: #e5e7eb;
      color: #9ca3af;
      border-color: #d1d5db;
      box-shadow: none;
      transform: none;
    }

    button.active-toggle {
      background: #eff6ff;
      border-color: #93c5fd;
      color: var(--accent-strong);
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.08);
    }

    .workspace,
    .step-panel,
    .structure-panel {
      display: grid;
      gap: 16px;
    }

    .step-meta,
    .status,
    .hint-box,
    .slider-box,
    .warning-box {
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--panel-soft);
      line-height: 1.7;
    }

    .warning-box {
      background: #fff7ed;
      border-color: #fdba74;
    }

    .hidden { display: none !important; }

    .slider-box {
      display: grid;
      gap: 12px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .slider-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .clause-grid,
    .role-grid {
      display: grid;
      gap: 14px;
    }

    .clause-box,
    .connector-box,
    .role-box {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      background: white;
    }

    .clause-box.confirmed,
    .connector-box.confirmed,
    .role-box.confirmed {
      background: #f8fbff;
      border-color: #93c5fd;
    }

    .clause-box-header,
    .role-box-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .role-title,
    .clause-title {
      font-weight: 700;
      font-size: 18px;
    }

    .title-with-help,
    .label-with-help {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .section-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .help-icon-btn {
      width: 32px;
      height: 32px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid var(--accent);
      background: white;
      color: var(--accent);
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
    }

    .help-icon-btn:hover {
      background: #eff6ff;
    }

    .help-modal-body {
      display: grid;
      gap: 14px;
    }

    .role-chip,
    .clause-chip {
      display: inline-block;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
    }

    .chip-modifier { background: var(--modifier); }
    .chip-subject { background: var(--subject); }
    .chip-verb { background: var(--verb); }
    .chip-object { background: var(--object); }

    .token-field {
      min-height: 92px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #fcfcff;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-content: flex-start;
    }

    .role-token {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: white;
      cursor: pointer;
      user-select: none;
      font-size: 20px;
      line-height: 1.2;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .role-token:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .role-token.selected {
      background: var(--selection);
      border-color: #6366f1;
    }

    .role-token.quick-anchor {
      background: var(--selection-anchor);
      border-color: #f59e0b;
    }

    .small-btn {
      padding: 8px 10px;
      font-size: 13px;
    }

    .placeholder {
      color: var(--muted);
      font-style: italic;
    }

    .tab-card { overflow: hidden; }
    .tab-scroll-wrap { position: relative; }

    .tab-scroll {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      padding: 8px 10px 16px;
      scroll-snap-type: x mandatory;
      scroll-padding-inline: 20px;
      scrollbar-width: thin;
    }

    .tab-scroll::-webkit-scrollbar { height: 10px; }
    .tab-scroll::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 999px;
    }

    .clause-tab-group {
      flex: 0 0 min(100%, 480px);
      scroll-snap-align: center;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      padding: 16px;
      display: grid;
      gap: 12px;
      justify-items: center;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .clause-tab-group.active {
      border-color: #93c5fd;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.12);
      transform: translateY(-4px);
    }

    .clause-tab-label {
      font-size: 16px;
      font-weight: 800;
      color: var(--accent);
    }

    .clause-tab-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: center;
    }

    .tab-btn {
      min-width: 74px;
      background: var(--tab);
      position: relative;
      overflow: hidden;
    }

    .tab-btn span {
      display: inline-block;
      transition: transform 0.22s ease;
    }

    .tab-btn:hover span,
    .tab-btn.active span {
      transform: translateY(-2px);
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      animation: rollActive 0.28s ease;
    }

    @keyframes rollActive {
      0% { transform: translateY(8px) rotateX(-35deg); opacity: 0.4; }
      100% { transform: translateY(0) rotateX(0deg); opacity: 1; }
    }

    .floating-editor {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(1180px, calc(100vw - 16px));
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(209, 213, 219, 0.95);
      border-bottom: none;
      border-radius: 22px 22px 0 0;
      box-shadow: 0 -18px 40px rgba(15, 23, 42, 0.12);
      padding: 14px 16px 16px;
      z-index: 40;
    }

    .floating-editor[data-expanded="false"] textarea {
      min-height: 0;
      height: 0;
      padding-top: 0;
      padding-bottom: 0;
      border-width: 0;
      opacity: 0;
      pointer-events: none;
      margin: 0;
    }

    .floating-editor[data-expanded="false"] .floating-editor-actions {
      display: none;
    }

    .floating-editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .floating-editor-title {
      font-size: 16px;
      font-weight: 800;
    }

    .editor-toggle { border-radius: 999px; }

    .floating-editor textarea {
      transition: height 0.22s ease, opacity 0.22s ease, padding 0.22s ease, border-width 0.22s ease;
      margin-bottom: 0;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 100;
    }

    .modal {
      width: min(760px, 100%);
      background: #fff;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.2);
      padding: 24px;
      display: grid;
      gap: 16px;
    }

    .review-list {
      display: grid;
      gap: 12px;
    }

    .review-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      background: var(--panel-soft);
    }

    .review-token-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .review-token {
      padding: 10px 14px;
      border: 2px solid #111827;
      background: white;
      color: #111827;
      font-weight: 700;
    }

    .review-token.clause {
      border-radius: 4px;
    }

    .review-token.connector {
      border-radius: 999px;
      background: #111827;
      color: white;
    }

    @media (max-width: 900px) {
      .app {
        padding: 16px 16px calc(var(--editor-height) + 24px);
      }

      .clause-tab-group {
        flex-basis: 92%;
      }

      .clause-tab-buttons {
        width: 100%;
        overflow-x: auto;
        padding-bottom: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="card">
      <div class="section-heading">
        <h1 style="margin: 0;">輸入要翻譯的中文句子</h1>
        <button class="help-icon-btn" data-help-key="appOverview" aria-label="中文句子分析工具說明">?</button>
      </div>
      <textarea id="sentenceInput">Leo昨天回家後馬上洗澡。</textarea>
      <div class="page-actions">
        <button id="tokenizeBtn" class="primary">開始翻譯</button>
        <button id="resetSentenceBtn">恢復預設句子</button>
      </div>
    </section>

    <section id="structureSection" class="card structure-panel">
      <div class="clause-box-header">
        <div>
          <div class="section-heading">
            <h2 style="margin: 0;">1. 辨認句子結構</h2>
            <button class="help-icon-btn" data-help-key="structureStep" aria-label="辨認句子結構說明">?</button>
          </div>
        </div>
      <div class="inline-actions">
          <button id="toggleStructureBtn" class="small-btn hidden">展開步驟 1</button>
        </div>
      </div>

      <div id="structureCollapsedSummary" class="review-item hidden"></div>

      <div id="structureBody">
      <p id="structureOriginalSentence" class="muted"></p>
      <div class="slider-box">
        <div class="slider-header">
          <div>
            <div class="title-with-help">
              <strong>子句數量</strong>
              <button class="help-icon-btn" data-help-key="clauseCount" aria-label="子句數量說明">?</button>
            </div>
          </div>
          <div class="slider-value" id="clauseCountValue">2</div>
        </div>
        <input id="clauseCountSlider" type="range" min="1" max="6" step="1" value="2" />
      </div>
      <div id="clauseGrid" class="clause-grid"></div>
      </div>
    </section>

    <section class="card tab-card">
      <div>
        <div class="section-heading">
          <h2 style="margin: 0;">2. 子句角色分析</h2>
          <button class="help-icon-btn" data-help-key="roleAnalysis" aria-label="子句角色分析說明">?</button>子句        </div>
      </div>
      <div class="tab-scroll-wrap">
        <div id="tabScroll" class="tab-scroll"></div>
      </div>
    </section>

    <section class="workspace">
      <div class="card">
        <div id="stepPanel" class="step-panel"></div>
      </div>
    </section>
  </div>

  <section id="floatingEditor" class="floating-editor" data-expanded="true">
    <div class="floating-editor-header">
      <div>
        <div class="title-with-help">
          <div class="floating-editor-title">英文翻譯浮動編輯器</div>
          <button class="help-icon-btn" data-help-key="floatingEditor" aria-label="英文翻譯浮動編輯器說明">?</button>
        </div>
      </div>
      <button id="toggleEditorBtn" class="editor-toggle">收合編輯器</button>
    </div>
    <textarea id="translationInput" placeholder="Write the English translation here..."></textarea>
    <div class="floating-editor-actions">
      <button id="clearTranslationBtn">清空翻譯</button>
    </div>
  </section>

  <div id="reviewModal" class="modal-backdrop hidden">
    <div class="modal">
      <div>
        <h3>確認子句辨認結果</h3>
        <p class="muted">以下是目前各子句與連接裝置的整理結果。請先寫出整句大結構，使用 <code>...</code> 作為子句占位符，例如：<code>..., but ...</code>。按下「下一步(翻譯子句)」後，內容會自動帶入底部的英文翻譯編輯器。</p>
      </div>
      <div id="reviewList" class="review-list"></div>
      <div class="review-item">
        <label for="sentenceStructureInput"><strong>整句大結構</strong></label>
        <input id="sentenceStructureInput" type="text" style="width: 100%; margin-top: 10px; padding: 12px 14px; border-radius: 12px; border: 1px solid #d1d5db; font: inherit;" placeholder="例如：..., but ..." />
      </div>
      <div class="inline-actions">
        <button id="reviewBackBtn">返回修改</button>
        <button id="reviewConfirmBtn" class="primary">下一步(翻譯子句)</button>
      </div>
    </div>
  </div>

  <div id="helpModal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="section-heading" style="justify-content: space-between; align-items: flex-start;">
        <div>
          <h3 id="helpModalTitle" style="margin: 0 0 6px 0;">說明</h3>
          <p id="helpModalDescription" class="muted" style="margin: 0;"></p>
        </div>
        <button id="helpModalCloseBtn" class="help-icon-btn" aria-label="關閉說明">×</button>
      </div>
      <div class="help-modal-body">
        <div class="review-item">
          <strong>範例</strong>
          <p id="helpModalExample" style="margin: 10px 0 0 0;"></p>
        </div>
      </div>
    </div>
  </div>

  <div id="subjectModal" class="modal-backdrop hidden">
    <div class="modal">
      <div>
        <h3>無主詞可選</h3>
        <p class="muted">請檢查原始中文句子，並在目前子句中補回省略主詞後再進行主詞分析。</p>
      </div>
      <div class="review-item">
        <strong>原始中文句子</strong>
        <p id="subjectModalSentence" style="margin: 10px 0 0 0;"></p>
      </div>
      <div class="review-item">
        <label for="subjectClauseInput"><strong>目前子句（可編輯）</strong></label>
        <textarea id="subjectClauseInput" style="margin-top: 10px;"></textarea>
      </div>
      <div class="inline-actions">
        <button id="subjectModalCancelBtn">取消</button>
        <button id="subjectModalApplyBtn" class="primary">更新主詞分析字詞</button>
      </div>
    </div>
  </div>

  <script>
    const sentenceInput = document.getElementById('sentenceInput');
    const tokenizeBtn = document.getElementById('tokenizeBtn');
    const resetSentenceBtn = document.getElementById('resetSentenceBtn');
    const stepPanel = document.getElementById('stepPanel');
    const clauseCountSlider = document.getElementById('clauseCountSlider');
    const clauseCountValue = document.getElementById('clauseCountValue');
    const clauseGrid = document.getElementById('clauseGrid');
    const structureOriginalSentence = document.getElementById('structureOriginalSentence');
    const structureBody = document.getElementById('structureBody');
    const structureCollapsedSummary = document.getElementById('structureCollapsedSummary');
    const structureSection = document.getElementById('structureSection');
    const tabScroll = document.getElementById('tabScroll');
    const floatingEditor = document.getElementById('floatingEditor');
    const toggleEditorBtn = document.getElementById('toggleEditorBtn');
    const toggleStructureBtn = document.getElementById('toggleStructureBtn');
    const translationInput = document.getElementById('translationInput');
    const clearTranslationBtn = document.getElementById('clearTranslationBtn');
    const reviewModal = document.getElementById('reviewModal');
    const reviewList = document.getElementById('reviewList');
    const reviewBackBtn = document.getElementById('reviewBackBtn');
    const reviewConfirmBtn = document.getElementById('reviewConfirmBtn');
    const sentenceStructureInput = document.getElementById('sentenceStructureInput');
    const helpModal = document.getElementById('helpModal');
    const helpModalTitle = document.getElementById('helpModalTitle');
    const helpModalDescription = document.getElementById('helpModalDescription');
    const helpModalExample = document.getElementById('helpModalExample');
    const helpModalCloseBtn = document.getElementById('helpModalCloseBtn');
    const subjectModal = document.getElementById('subjectModal');
    const subjectModalSentence = document.getElementById('subjectModalSentence');
    const subjectClauseInput = document.getElementById('subjectClauseInput');
    const subjectModalCancelBtn = document.getElementById('subjectModalCancelBtn');
    const subjectModalApplyBtn = document.getElementById('subjectModalApplyBtn');

    const defaultSentence = 'Leo昨天回家後馬上洗澡。';

    const helpContent = {
      appOverview: {
        title: '輸入要翻譯的中文句子',
        description: '將要翻譯的中文句子輸入到輸入框中。',
        example: 'Leo昨天回家後馬上洗澡。'
      },
      structureStep: {
        title: '辨認句子結構',
        description: '先決定句子包含幾個子句，再把相鄰子句間的連接裝置找出來。',
        example: '例如：「Leo昨天回家後馬上洗澡。」可分成兩個子句：「Leo昨天回家」以及「馬上洗澡」，因此將子句數量滑桿拉至2，把「Leo昨天回家」標記為子句1，「馬上洗澡」標記為子句2，再把「後」標記成兩個子句之間的連接裝置。'
      },
      clauseCount: {
        title: '子句數量',
        description: '用滑桿調整子句數量',
        example: '例如：「Leo昨天回家後馬上洗澡。」可分成兩個子句：「Leo昨天回家」以及「馬上洗澡」，因此將子句數量滑桿拉至2。'
      },
      roleAnalysis: {
        title: '子句角色分析',
        description: '按子句順序翻譯，逐一標記每個子句中的主詞、動詞、受詞與子句修飾詞。',
        example: '例如：在子句1(Leo昨天回家)，「Leo」是沒有加任何修飾詞的主詞，所以「主詞修飾詞」的部分不必選擇(直接按「確認」)，而「主詞」則需要選擇「Leo」。確認後，點選「下一個角色」，開始分析動詞，在子句1中，只有「回家」是動詞，沒有動詞修飾詞，因此「動詞修飾詞」的部分不必選擇，「動詞」則選擇「回家」。依此類推完成受詞與子句修飾詞的分析後，再進行子句2的角色分析。'
      },
      floatingEditor: {
        title: '英文翻譯浮動編輯器',
        description: '底部編輯器固定在頁面下方，可展開或收合，方便學生一邊分析句子一邊撰寫英文翻譯。',
        example: '例如：完成 Clause 1 的分析後，直接在底部輸入 “Xiaoming happily played soccer in the park yesterday.”。'
      }
    };

    const roleSteps = [
      {
        id: 'subject',
        shortLabel: 'S',
        title: '主詞分析',

        example: '例如：在「可愛的Leo昨天回家後馬上洗澡。」這個句子中有兩個子句。 第一個子句(可愛的Leo昨天回家)進行主詞分析時，把「可愛的」選為主詞修飾詞，「Leo」選為主詞。第二個子句(馬上洗澡)進行主詞分析時，找不到明確的主詞，因此點選「無主詞可選」，在彈出視窗中把子句修改成「他馬上洗澡」，再把「他」選為主詞。',
        roles: [
          { id: 'modSub', label: '主詞修飾詞', chipClass: 'chip-modifier' },
          { id: 'subjectCore', label: '主詞', chipClass: 'chip-subject' }
        ]
      },
      {
        id: 'verb',
        shortLabel: 'V',
        title: '動詞分析',
        description: '從目前子句的字詞中，找出動詞修飾詞與動詞。',
        example: '例如：在「可愛的Leo昨天回家後馬上洗澡。」這個句子中有兩個子句。第一個子句(可愛的Leo昨天回家)進行動詞分析時，沒有動詞修飾詞(直接按「確認」)，「回家」則選為動詞。第二個子句(馬上洗澡)進行動詞分析時，把「馬上」選為動詞修飾詞，「洗澡」選為動詞。',
        roles: [
          { id: 'modVerb', label: '動詞修飾詞', chipClass: 'chip-modifier' },
          { id: 'verbCore', label: '動詞', chipClass: 'chip-verb' }
        ]
      },
      {
        id: 'object',
        shortLabel: 'O',
        title: '受詞分析',
        description: '從目前子句的字詞中，找出受詞修飾詞與受詞。',
        example: '例如：在「Leo撿起紅色的足球」這個子句中，可把「紅色的」放入受詞修飾詞，「足球」放入受詞。',
        roles: [
          { id: 'modObj', label: '受詞修飾詞', chipClass: 'chip-modifier' },
          { id: 'objectCore', label: '受詞', chipClass: 'chip-object' }
        ]
      },
      {
        id: 'clauseModifier',
        shortLabel: 'CM',
        title: '子句修飾詞分析',
        description: '請找出修飾整個子句的內容。',
        example: '例如：在「很不幸地，Leo昨天在公園受傷了。」子句中，可把「昨天」標成時間修飾詞、「在公園」標成地方修飾詞、「很不幸地」標成整個子句的修飾詞。',
        roles: [
          { id: 'modManner', label: '整個子句的修飾詞', chipClass: 'chip-modifier' },
          { id: 'modPlace', label: '地方修飾詞', chipClass: 'chip-modifier' },
          { id: 'modTime', label: '時間修飾詞', chipClass: 'chip-modifier' }
        ]
      }
    ];

    let tokens = [];
    let clauseCount = Number(clauseCountSlider.value);
    let activeClauseIndex = 0;
    let activeRoleIndex = 0;
    let clauseSelections = [];
    let connectingDevices = [];
    let clauseTextOverrides = [];
    let assignments = [];
    let scrollTimer = null;
    let pendingClauseCount = clauseCount;
    let structureCollapsed = false;
    let reviewModalShown = false;
    const quickSelectionState = {
      clause: {},
      connector: {},
      role: {}
    };

    function tokenizeChinese(text) {
      return text
        .trim()
        .split(/(\s+|[，。！？；：、「」『』（）()])/)
        .filter(part => part && !/^\s+$/.test(part))
        .flatMap(part => {
          if (/^[，。！？；：、「」『』（）()]$/.test(part)) return [part];
          if (/\s/.test(part)) return [];
          return [...part];
        })
        .map((part, index) => ({ id: index, text: part }));
    }

    function createDefaultClauseState(index) {
      return {
        clauseIndex: index,
        selected: [],
        confirmed: false,
        quickSelectionEnabled: true
      };
    }

    function createRoleState() {
      const store = {};
      roleSteps.forEach(step => {
        step.roles.forEach(role => {
          store[role.id] = {
            selected: [],
            confirmed: false,
            quickSelectionEnabled: false
          };
        });
      });
      return store;
    }

    function createDefaultConnectorState(index) {
      return {
        connectorIndex: index,
        selected: [],
        confirmed: false,
        quickSelectionEnabled: false
      };
    }

    function initializeClauseData(count) {
      clauseSelections = Array.from({ length: count }, (_, index) => createDefaultClauseState(index));
      connectingDevices = Array.from({ length: Math.max(0, count - 1) }, (_, index) => createDefaultConnectorState(index));
      clauseTextOverrides = Array.from({ length: count }, () => '');
      assignments = Array.from({ length: count }, () => createRoleState());
      activeClauseIndex = Math.min(activeClauseIndex, Math.max(0, count - 1));
      activeRoleIndex = Math.min(activeRoleIndex, roleSteps.length - 1);
    }

    function normalizeStateAfterResize(nextCount) {
      clauseSelections = clauseSelections.slice(0, nextCount);
      connectingDevices = connectingDevices.slice(0, Math.max(0, nextCount - 1));
      clauseTextOverrides = clauseTextOverrides.slice(0, nextCount);
      assignments = assignments.slice(0, nextCount);

      while (clauseSelections.length < nextCount) {
        clauseSelections.push(createDefaultClauseState(clauseSelections.length));
      }
      while (assignments.length < nextCount) {
        assignments.push(createRoleState());
      }
      while (connectingDevices.length < Math.max(0, nextCount - 1)) {
        connectingDevices.push(createDefaultConnectorState(connectingDevices.length));
      }
      while (clauseTextOverrides.length < nextCount) {
        clauseTextOverrides.push('');
      }

      clauseSelections.forEach((state, index) => {
        state.clauseIndex = index;
        state.quickSelectionEnabled = Boolean(state.quickSelectionEnabled);
      });
      connectingDevices.forEach((state, index) => {
        state.connectorIndex = index;
        state.quickSelectionEnabled = Boolean(state.quickSelectionEnabled);
      });

      activeClauseIndex = Math.min(activeClauseIndex, Math.max(0, nextCount - 1));
      clearInvalidQuickAnchors();
    }

    function getClauseTokenIds(clauseIndex) {
      const clauseState = clauseSelections[clauseIndex];
      if (!clauseState) return [];
      if (clauseState.confirmed) return [...clauseState.selected];
      if (clauseState.selected.length) return [...clauseState.selected];
      return tokens.map(token => token.id);
    }

    function getClauseTokens(clauseIndex) {
      const clauseTokenIds = new Set(getClauseTokenIds(clauseIndex));
      return tokens.filter(token => clauseTokenIds.has(token.id));
    }

    function getRoleState(clauseIndex, roleId) {
      return assignments[clauseIndex]?.[roleId];
    }

    function getClauseAnalysisTokens(clauseIndex) {
      const overrideText = clauseTextOverrides[clauseIndex]?.trim();
      if (overrideText) {
        return tokenizeChinese(overrideText).map((token, index) => ({ id: index, text: token.text }));
      }
      return getClauseTokens(clauseIndex);
    }

    function getConnectorState(connectorIndex) {
      return connectingDevices[connectorIndex];
    }

    function allStructureConfirmed() {
      const clausesReady = clauseSelections.length > 0 && clauseSelections.every(state => state.confirmed);
      const connectorsReady = connectingDevices.every(state => state.confirmed);
      return clausesReady && connectorsReady;
    }

    function areCurrentStepRolesConfirmed() {
      const step = roleSteps[activeRoleIndex];
      return step.roles.every(role => getRoleState(activeClauseIndex, role.id)?.confirmed);
    }

    function isCurrentClauseFullyConfirmed() {
      return roleSteps.every(step => step.roles.every(role => getRoleState(activeClauseIndex, role.id)?.confirmed));
    }

    function getClauseReviewText(clauseIndex) {
      return getClauseTokens(clauseIndex).map(token => token.text).join('');
    }

    function getConnectorReviewText(connectorIndex) {
      const connectorState = getConnectorState(connectorIndex);
      if (!connectorState) return '';
      const ids = connectorState.confirmed || connectorState.selected.length
        ? connectorState.selected
        : tokens.map(token => token.id);
      const set = new Set(ids);
      return tokens.filter(token => set.has(token.id)).map(token => token.text).join('');
    }

    function renderReviewModal() {
      const sequence = [];
      clauseSelections.forEach((_, index) => {
        const clauseText = getClauseReviewText(index) || '（空）';
        sequence.push(`<div class="review-token clause">子句${index + 1}: ${clauseText}</div>`);
        if (index < connectingDevices.length) {
          sequence.push(`<div class="review-token connector">${getConnectorReviewText(index) || '（無連接裝置）'}</div>`);
        }
      });
      reviewList.innerHTML = `
        <div class="review-item">
          <strong>分析結果</strong>
          <div class="review-token-row" style="margin-top: 10px;">${sequence.join('')}</div>
        </div>
      `;
    }

    function renderCollapsedStructureSummary() {
      const sequence = [];
      clauseSelections.forEach((_, index) => {
        const clauseText = getClauseReviewText(index) || '（空）';
        sequence.push(`<div class="review-token clause">子句${index + 1}: ${clauseText}</div>`);
        if (index < connectingDevices.length) {
          sequence.push(`<div class="review-token connector">${getConnectorReviewText(index) || '（無連接裝置）'}</div>`);
        }
      });
      structureCollapsedSummary.innerHTML = `
        <strong>辨認句子結構分析結果</strong>
        <div class="review-token-row" style="margin-top: 10px;">${sequence.join('')}</div>
      `;
    }

    function showReviewModal() {
      renderReviewModal();
      if (!sentenceStructureInput.value.trim()) {
        sentenceStructureInput.value = translationInput.value.trim();
      }
      updateReviewConfirmButtonState();
      reviewModal.classList.remove('hidden');
    }

    function hideReviewModal() {
      reviewModal.classList.add('hidden');
    }

    function updateReviewConfirmButtonState() {
      reviewConfirmBtn.disabled = !sentenceStructureInput.value.trim();
    }

    function updateStructureVisibility() {
      structureBody.classList.toggle('hidden', structureCollapsed);
      toggleStructureBtn.classList.toggle('hidden', !structureCollapsed);
      toggleStructureBtn.textContent = structureCollapsed ? '展開步驟 1' : '收合步驟 1';
      structureCollapsedSummary.classList.toggle('hidden', !structureCollapsed);
      if (structureCollapsed) renderCollapsedStructureSummary();
    }

    function updateSentencePreview() {
      const text = sentenceInput.value.trim();
      structureOriginalSentence.textContent = text ? `原始句子：${text}` : '原始句子：（尚未輸入句子）';
    }

    function openSubjectModal() {
      subjectModalSentence.textContent = sentenceInput.value.trim() || '（尚未輸入句子）';
      subjectClauseInput.value = clauseTextOverrides[activeClauseIndex]?.trim() || getClauseReviewText(activeClauseIndex);
      subjectModal.classList.remove('hidden');
    }

    function hideSubjectModal() {
      subjectModal.classList.add('hidden');
    }

    function getQuickAnchorKey(kind, clauseIndex, roleId = '') {
      if (kind === 'clause') return `clause-${clauseIndex}`;
      if (kind === 'connector') return `connector-${clauseIndex}`;
      return `role-${clauseIndex}-${roleId}`;
    }

    function clearInvalidQuickAnchors() {
      Object.keys(quickSelectionState.clause).forEach(key => {
        const match = key.match(/^clause-(\d+)$/);
        if (match && Number(match[1]) >= clauseCount) delete quickSelectionState.clause[key];
      });
      Object.keys(quickSelectionState.connector).forEach(key => {
        const match = key.match(/^connector-(\d+)$/);
        if (match && Number(match[1]) >= connectingDevices.length) delete quickSelectionState.connector[key];
      });

      Object.keys(quickSelectionState.role).forEach(key => {
        const match = key.match(/^role-(\d+)-(.+)$/);
        if (match && Number(match[1]) >= clauseCount) delete quickSelectionState.role[key];
      });
    }

    function toggleQuickSelection(kind, clauseIndex, roleId = '') {
      if (kind === 'clause') {
        const clauseState = clauseSelections[clauseIndex];
        clauseState.quickSelectionEnabled = !clauseState.quickSelectionEnabled;
        if (!clauseState.quickSelectionEnabled) delete quickSelectionState.clause[getQuickAnchorKey(kind, clauseIndex)];
        renderClauseGrid();
        return;
      }
      if (kind === 'connector') {
        const connectorState = getConnectorState(clauseIndex);
        connectorState.quickSelectionEnabled = !connectorState.quickSelectionEnabled;
        if (!connectorState.quickSelectionEnabled) delete quickSelectionState.connector[getQuickAnchorKey(kind, clauseIndex)];
        renderClauseGrid();
        return;
      }

      const roleState = getRoleState(clauseIndex, roleId);
      roleState.quickSelectionEnabled = !roleState.quickSelectionEnabled;
      if (!roleState.quickSelectionEnabled) delete quickSelectionState.role[getQuickAnchorKey(kind, clauseIndex, roleId)];
      renderStepPanel();
    }

    function getClauseWarningMarkup() {
      const trimmedCount = Math.max(0, clauseSelections.length - clauseCount);
      if (!trimmedCount) return '';
      return `<div class="warning-box">提醒：若把子句數量調小，系統只會保留前 ${clauseCount} 個子句；後面的子句資料會被移除。</div>`;
    }

    function renderClauseTokens(clauseIndex) {
      if (!tokens.length) return '<div class="placeholder">請先切成字詞。</div>';

      const state = clauseSelections[clauseIndex];
      const selectedSet = new Set(state.selected);
      const visibleTokens = state.confirmed ? tokens.filter(token => selectedSet.has(token.id)) : tokens;
      const anchorId = quickSelectionState.clause[getQuickAnchorKey('clause', clauseIndex)];

      if (!visibleTokens.length) return '<div class="placeholder">沒有任何字詞屬於此分類。</div>';

      return visibleTokens.map(token => `
        <button class="role-token ${selectedSet.has(token.id) ? 'selected' : ''} ${anchorId === token.id ? 'quick-anchor' : ''}" data-clause-token="${token.id}" data-clause-index="${clauseIndex}">${token.text}</button>
      `).join('');
    }

    function renderConnectorTokens(connectorIndex) {
      if (!tokens.length) return '<div class="placeholder">請先切成字詞。</div>';

      const state = getConnectorState(connectorIndex);
      const selectedSet = new Set(state.selected);
      const visibleTokens = state.confirmed ? tokens.filter(token => selectedSet.has(token.id)) : tokens;
      const anchorId = quickSelectionState.connector[getQuickAnchorKey('connector', connectorIndex)];

      if (!visibleTokens.length) return '<div class="placeholder">沒有任何字詞屬於此分類。</div>';

      return visibleTokens.map(token => `
        <button class="role-token ${selectedSet.has(token.id) ? 'selected' : ''} ${anchorId === token.id ? 'quick-anchor' : ''}" data-connector-token="${token.id}" data-connector-index="${connectorIndex}">${token.text}</button>
      `).join('');
    }

    function renderClauseGrid() {
      const items = [];
      clauseSelections.forEach((state, index) => {
        items.push(`
        <div class="clause-box ${state.confirmed ? 'confirmed' : ''}">
          <div class="clause-box-header">
            <div>
              <div class="clause-title">子句 ${index + 1}</div>
              
            </div>
            <div class="clause-actions">
              <button class="small-btn ${state.quickSelectionEnabled ? 'active-toggle' : ''}" data-quick-clause="${index}">${state.quickSelectionEnabled ? '快速選取：開' : '快速選取：關'}</button>
              <button class="small-btn" data-reset-clause="${index}">重設子句</button>
              <button class="small-btn primary" data-confirm-clause="${index}">確認子句</button>
            </div>
          </div>
           <div class="muted" style="margin: 8px; margin-left: 1px">
            ${state.confirmed ? '' : '請選擇子句。'}
            ${state.quickSelectionEnabled ? '(快速選取模式已開啟：先點起點，再點終點，可一次選取中間所有字詞。)' : ''}
            
          </div>
          <div class="token-field">${renderClauseTokens(index)}</div>
         
        </div>`);

        if (index < connectingDevices.length) {
          const connectorState = getConnectorState(index);
          items.push(`
          <div class="connector-box ${connectorState.confirmed ? 'confirmed' : ''}">
            <div class="clause-box-header">
              <div>
                <div class="clause-title">子句 ${index + 1} ↔ 子句 ${index + 2} 連接裝置</div>
                
              </div>
              <div class="clause-actions">
                <button class="small-btn ${connectorState.quickSelectionEnabled ? 'active-toggle' : ''}" data-quick-connector="${index}">${connectorState.quickSelectionEnabled ? '快速選取：開' : '快速選取：關'}</button>
                <button class="small-btn" data-reset-connector="${index}">重設連接裝置</button>
                <button class="small-btn primary" data-confirm-connector="${index}">確認連接裝置</button>
              </div>
            </div>
              <div class="muted" style="margin: 8px; margin-left: 1px">
              ${connectorState.confirmed ? '' : '請圈選連接這兩個子句的連接裝置。'}
              ${connectorState.quickSelectionEnabled ? '(快速選取模式已開啟：先點起點，再點終點，可一次選取中間所有字詞。)' : ''}
              
            </div>
            <div class="token-field">${renderConnectorTokens(index)}</div>
          
          </div>`);
        }
      });

      clauseGrid.innerHTML = `${getClauseWarningMarkup()}${items.join('')}`;

      clauseGrid.querySelectorAll('[data-clause-token]').forEach(btn => {
        btn.addEventListener('click', () => handleClauseTokenClick(Number(btn.dataset.clauseIndex), Number(btn.dataset.clauseToken)));
      });
      clauseGrid.querySelectorAll('[data-connector-token]').forEach(btn => {
        btn.addEventListener('click', () => handleConnectorTokenClick(Number(btn.dataset.connectorIndex), Number(btn.dataset.connectorToken)));
      });
      clauseGrid.querySelectorAll('[data-confirm-clause]').forEach(btn => {
        btn.addEventListener('click', () => confirmClause(Number(btn.dataset.confirmClause)));
      });
      clauseGrid.querySelectorAll('[data-confirm-connector]').forEach(btn => {
        btn.addEventListener('click', () => confirmConnector(Number(btn.dataset.confirmConnector)));
      });
      clauseGrid.querySelectorAll('[data-reset-clause]').forEach(btn => {
        btn.addEventListener('click', () => resetClause(Number(btn.dataset.resetClause)));
      });
      clauseGrid.querySelectorAll('[data-reset-connector]').forEach(btn => {
        btn.addEventListener('click', () => resetConnector(Number(btn.dataset.resetConnector)));
      });
      clauseGrid.querySelectorAll('[data-quick-clause]').forEach(btn => {
        btn.addEventListener('click', () => toggleQuickSelection('clause', Number(btn.dataset.quickClause)));
      });
      clauseGrid.querySelectorAll('[data-quick-connector]').forEach(btn => {
        btn.addEventListener('click', () => toggleQuickSelection('connector', Number(btn.dataset.quickConnector)));
      });
    }

    function renderTabs() {
      tabScroll.innerHTML = clauseSelections.map((_, clauseIndex) => `
        <div class="clause-tab-group ${clauseIndex === activeClauseIndex ? 'active' : ''}" data-clause-group="${clauseIndex}">
          <div class="clause-tab-label">子句 ${clauseIndex + 1}</div>
          <div class="clause-tab-buttons">
            ${roleSteps.map((step, roleIndex) => `
              <button class="tab-btn ${clauseIndex === activeClauseIndex && roleIndex === activeRoleIndex ? 'active' : ''}" data-tab-clause="${clauseIndex}" data-tab-role="${roleIndex}">
                <span>${step.shortLabel}</span>
              </button>
            `).join('')}
          </div>
        </div>
      `).join('');

      tabScroll.querySelectorAll('[data-tab-role]').forEach(btn => {
        btn.addEventListener('click', () => {
          activeClauseIndex = Number(btn.dataset.tabClause);
          activeRoleIndex = Number(btn.dataset.tabRole);
          renderTabs();
          renderStepPanel();
          scrollClauseTabIntoView(activeClauseIndex);
        });
      });
    }

    function scrollClauseTabIntoView(clauseIndex) {
      const group = tabScroll.querySelector(`[data-clause-group="${clauseIndex}"]`);
      if (!group) return;
      group.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    function syncActiveClauseFromScroll() {
      const groups = [...tabScroll.querySelectorAll('[data-clause-group]')];
      if (!groups.length) return;

      const containerRect = tabScroll.getBoundingClientRect();
      const containerCenter = containerRect.left + containerRect.width / 2;
      let nearestIndex = activeClauseIndex;
      let nearestDistance = Number.POSITIVE_INFINITY;

      groups.forEach(group => {
        const rect = group.getBoundingClientRect();
        const center = rect.left + rect.width / 2;
        const distance = Math.abs(center - containerCenter);
        const groupIndex = Number(group.dataset.clauseGroup);
        if (distance < nearestDistance) {
          nearestDistance = distance;
          nearestIndex = groupIndex;
        }
      });

      if (nearestIndex !== activeClauseIndex) {
        activeClauseIndex = nearestIndex;
        renderTabs();
        renderStepPanel();
      }
    }

    function renderRoleTokens(roleId) {
      const clauseTokens = getClauseAnalysisTokens(activeClauseIndex);
      if (!clauseTokens.length) return '<div class="placeholder">此子句目前沒有可分析的字詞。</div>';

      const roleState = getRoleState(activeClauseIndex, roleId);
      const selectedSet = new Set(roleState.selected);
      const visibleTokens = roleState.confirmed ? clauseTokens.filter(token => selectedSet.has(token.id)) : clauseTokens;
      const anchorId = quickSelectionState.role[getQuickAnchorKey('role', activeClauseIndex, roleId)];

      if (!visibleTokens.length) return '<div class="placeholder">沒有任何字詞屬於此分類。</div>';

      return visibleTokens.map(token => `
        <button class="role-token ${selectedSet.has(token.id) ? 'selected' : ''} ${anchorId === token.id ? 'quick-anchor' : ''}" data-role-id="${roleId}" data-token-id="${token.id}">${token.text}</button>
      `).join('');
    }

    function openHelpModal(helpKey) {
      const help = helpContent[helpKey] || roleSteps.find(step => step.id === helpKey);
      if (!help) return;
      helpModalTitle.textContent = help.title;
      helpModalDescription.textContent = help.description;
      helpModalExample.textContent = help.example;
      helpModal.classList.remove('hidden');
    }

    function closeHelpModal() {
      helpModal.classList.add('hidden');
    }

    function renderStepPanel() {
      const step = roleSteps[activeRoleIndex];
      const clauseTokens = getClauseAnalysisTokens(activeClauseIndex);
      const currentStepConfirmed = areCurrentStepRolesConfirmed();
      const onLastRole = activeRoleIndex === roleSteps.length - 1;
      const canGoNextRole = currentStepConfirmed && !onLastRole;
      const canGoNextClause = currentStepConfirmed && onLastRole && activeClauseIndex < clauseCount - 1;

      stepPanel.innerHTML = `
        <div>
          <div class="section-heading">
            <h2 style="margin: 0;">子句 ${activeClauseIndex + 1}｜${step.title}</h2>
            <button class="help-icon-btn" data-help-step="${step.id}" aria-label="${step.title}說明">?</button>
          </div>
        </div>
        <div class="hint-box">此區顯示的字詞來源為目前捲動選中的子句：<strong>${clauseTokens.map(token => token.text).join(' ') || '（無字詞）'}</strong></div>
        <div class="role-grid">
          ${step.roles.map(role => {
            const state = getRoleState(activeClauseIndex, role.id);
            return `
              <div class="role-box ${state.confirmed ? 'confirmed' : ''}" data-role-id="${role.id}">
                <div class="role-box-header">
                  <div>
                    <div class="role-title">${role.label}</div>
                    <div class="role-chip ${role.chipClass}">${role.label}</div>
                  </div>
                  <div class="inline-actions">
                    <button class="small-btn ${state.quickSelectionEnabled ? 'active-toggle' : ''}" data-quick-role="${role.id}">${state.quickSelectionEnabled ? '快速選取：開' : '快速選取：關'}</button>
                    <button class="small-btn" data-reset-role="${role.id}">重設此區</button>
                    ${step.id === 'subject' && role.id === 'subjectCore' ? '<button class="small-btn" data-open-subject-modal="true">無主詞可選</button>' : ''}
                    <button class="small-btn primary" data-confirm-role="${role.id}">確認</button>
                  </div>
                </div>
                <div class="token-field">${renderRoleTokens(role.id)}</div>
                <div class="muted" style="margin-top: 8px;">
                  ${state.confirmed ? '' : '請選擇符合子句角色的字詞。'}
                  ${state.quickSelectionEnabled ? '(快速選取模式已開啟：先點起點，再點終點，可一次選取中間所有字詞。)' : ''}
                  
                </div>
              </div>
            `;
          }).join('')}
        </div>
        <div class="step-actions">
          <button id="prevStepBtn">上一個角色</button>
          <button id="nextStepBtn" class="primary" ${canGoNextRole ? '' : 'disabled'}>下一個角色</button>
          ${canGoNextClause ? '<button id="nextClauseBtn" class="primary">下一個子句</button>' : ''}
        </div>
      `;

      stepPanel.querySelectorAll('[data-token-id]').forEach(btn => {
        btn.addEventListener('click', () => handleRoleTokenClick(btn.dataset.roleId, Number(btn.dataset.tokenId)));
      });
      stepPanel.querySelectorAll('[data-help-step]').forEach(btn => {
        btn.addEventListener('click', () => openHelpModal(btn.dataset.helpStep));
      });
      stepPanel.querySelectorAll('[data-confirm-role]').forEach(btn => {
        btn.addEventListener('click', () => confirmRole(btn.dataset.confirmRole));
      });
      stepPanel.querySelectorAll('[data-reset-role]').forEach(btn => {
        btn.addEventListener('click', () => resetRole(btn.dataset.resetRole));
      });
      stepPanel.querySelectorAll('[data-quick-role]').forEach(btn => {
        btn.addEventListener('click', () => toggleQuickSelection('role', activeClauseIndex, btn.dataset.quickRole));
      });
      stepPanel.querySelectorAll('[data-open-subject-modal]').forEach(btn => {
        btn.addEventListener('click', openSubjectModal);
      });

      document.getElementById('prevStepBtn').addEventListener('click', () => {
        activeRoleIndex = Math.max(0, activeRoleIndex - 1);
        renderTabs();
        renderStepPanel();
      });

      const nextStepBtn = document.getElementById('nextStepBtn');
      if (!nextStepBtn.disabled) {
        nextStepBtn.addEventListener('click', () => {
          activeRoleIndex = Math.min(roleSteps.length - 1, activeRoleIndex + 1);
          renderTabs();
          renderStepPanel();
        });
      }

      const nextClauseBtn = document.getElementById('nextClauseBtn');
      if (nextClauseBtn) {
        nextClauseBtn.addEventListener('click', () => {
          activeClauseIndex = Math.min(clauseCount - 1, activeClauseIndex + 1);
          activeRoleIndex = 0;
          renderTabs();
          renderStepPanel();
          scrollClauseTabIntoView(activeClauseIndex);
        });
      }
    }

    function selectTokenRange(existingSelection, tokenSourceIds, startId, endId) {
      const startIndex = tokenSourceIds.indexOf(startId);
      const endIndex = tokenSourceIds.indexOf(endId);
      if (startIndex === -1 || endIndex === -1) return existingSelection;
      const [from, to] = startIndex <= endIndex ? [startIndex, endIndex] : [endIndex, startIndex];
      const nextSet = new Set(existingSelection);
      tokenSourceIds.slice(from, to + 1).forEach(id => nextSet.add(id));
      return tokenSourceIds.filter(id => nextSet.has(id));
    }

    function handleClauseTokenClick(clauseIndex, tokenId) {
      const state = clauseSelections[clauseIndex];
      if (state.quickSelectionEnabled) {
        const key = getQuickAnchorKey('clause', clauseIndex);
        const currentAnchor = quickSelectionState.clause[key];
        if (currentAnchor === undefined) {
          quickSelectionState.clause[key] = tokenId;
          renderClauseGrid();
          return;
        }
        state.selected = selectTokenRange(state.selected, tokens.map(token => token.id), currentAnchor, tokenId);
        delete quickSelectionState.clause[key];
        state.confirmed = false;
        reviewModalShown = false;
        structureCollapsed = false;
        renderClauseGrid();
        renderStepPanel();
        return;
      }
      toggleClauseToken(clauseIndex, tokenId);
    }

    function handleConnectorTokenClick(connectorIndex, tokenId) {
      const state = getConnectorState(connectorIndex);
      if (state.quickSelectionEnabled) {
        const key = getQuickAnchorKey('connector', connectorIndex);
        const currentAnchor = quickSelectionState.connector[key];
        if (currentAnchor === undefined) {
          quickSelectionState.connector[key] = tokenId;
          renderClauseGrid();
          return;
        }
        state.selected = selectTokenRange(state.selected, tokens.map(token => token.id), currentAnchor, tokenId);
        delete quickSelectionState.connector[key];
        state.confirmed = false;
        reviewModalShown = false;
        structureCollapsed = false;
        renderClauseGrid();
        return;
      }
      toggleConnectorToken(connectorIndex, tokenId);
    }

    function toggleClauseToken(clauseIndex, tokenId) {
      const state = clauseSelections[clauseIndex];
      const set = new Set(state.selected);
      if (set.has(tokenId)) set.delete(tokenId);
      else set.add(tokenId);
      state.selected = tokens.map(token => token.id).filter(id => set.has(id));
      state.confirmed = false;
      reviewModalShown = false;
      structureCollapsed = false;
      renderClauseGrid();
      renderStepPanel();
    }

    function confirmClause(clauseIndex) {
      clauseSelections[clauseIndex].confirmed = true;
      renderClauseGrid();
      renderTabs();
      renderStepPanel();
      if (allStructureConfirmed() && !reviewModalShown) {
        showReviewModal();
      }
    }

    function toggleConnectorToken(connectorIndex, tokenId) {
      const state = getConnectorState(connectorIndex);
      const set = new Set(state.selected);
      if (set.has(tokenId)) set.delete(tokenId);
      else set.add(tokenId);
      state.selected = tokens.map(token => token.id).filter(id => set.has(id));
      state.confirmed = false;
      reviewModalShown = false;
      structureCollapsed = false;
      renderClauseGrid();
    }

    function confirmConnector(connectorIndex) {
      getConnectorState(connectorIndex).confirmed = true;
      renderClauseGrid();
      if (allStructureConfirmed() && !reviewModalShown) {
        showReviewModal();
      }
    }

    function resetClause(clauseIndex) {
      const quickState = clauseSelections[clauseIndex].quickSelectionEnabled;
      clauseSelections[clauseIndex] = createDefaultClauseState(clauseIndex);
      clauseSelections[clauseIndex].quickSelectionEnabled = quickState;
      clauseTextOverrides[clauseIndex] = '';
      assignments[clauseIndex] = createRoleState();
      delete quickSelectionState.clause[getQuickAnchorKey('clause', clauseIndex)];
      Object.keys(quickSelectionState.role)
        .filter(key => key.startsWith(`role-${clauseIndex}-`))
        .forEach(key => delete quickSelectionState.role[key]);
      reviewModalShown = false;
      structureCollapsed = false;
      renderClauseGrid();
      renderTabs();
      renderStepPanel();
    }

    function resetConnector(connectorIndex) {
      const quickState = getConnectorState(connectorIndex).quickSelectionEnabled;
      connectingDevices[connectorIndex] = createDefaultConnectorState(connectorIndex);
      connectingDevices[connectorIndex].quickSelectionEnabled = quickState;
      delete quickSelectionState.connector[getQuickAnchorKey('connector', connectorIndex)];
      reviewModalShown = false;
      structureCollapsed = false;
      renderClauseGrid();
    }

    function handleRoleTokenClick(roleId, tokenId) {
      const roleState = getRoleState(activeClauseIndex, roleId);
      if (roleState.quickSelectionEnabled) {
        const key = getQuickAnchorKey('role', activeClauseIndex, roleId);
        const currentAnchor = quickSelectionState.role[key];
        if (currentAnchor === undefined) {
          quickSelectionState.role[key] = tokenId;
          renderStepPanel();
          return;
        }
        roleState.selected = selectTokenRange(roleState.selected, getClauseAnalysisTokens(activeClauseIndex).map(token => token.id), currentAnchor, tokenId);
        delete quickSelectionState.role[key];
        roleState.confirmed = false;
        renderStepPanel();
        return;
      }
      toggleRoleToken(roleId, tokenId);
    }

    function toggleRoleToken(roleId, tokenId) {
      const roleState = getRoleState(activeClauseIndex, roleId);
      const availableTokenIds = getClauseAnalysisTokens(activeClauseIndex).map(token => token.id);
      const set = new Set(roleState.selected);
      if (set.has(tokenId)) set.delete(tokenId);
      else set.add(tokenId);
      roleState.selected = availableTokenIds.filter(id => set.has(id));
      roleState.confirmed = false;
      renderStepPanel();
    }

    function confirmRole(roleId) {
      getRoleState(activeClauseIndex, roleId).confirmed = true;
      renderStepPanel();
    }

    function resetRole(roleId) {
      const roleState = getRoleState(activeClauseIndex, roleId);
      const quickEnabled = roleState.quickSelectionEnabled;
      roleState.selected = [];
      roleState.confirmed = false;
      roleState.quickSelectionEnabled = quickEnabled;
      delete quickSelectionState.role[getQuickAnchorKey('role', activeClauseIndex, roleId)];
      renderStepPanel();
    }

    function clauseHasEdits(clauseIndex) {
      const clauseState = clauseSelections[clauseIndex];
      if (!clauseState) return false;
      if (clauseState.selected.length || clauseState.confirmed) return true;
      return roleSteps.some(step => step.roles.some(role => {
        const state = getRoleState(clauseIndex, role.id);
        return state && (state.selected.length || state.confirmed);
      }));
    }

    function connectorHasEdits(connectorIndex) {
      const connectorState = getConnectorState(connectorIndex);
      return Boolean(connectorState && (connectorState.selected.length || connectorState.confirmed));
    }

    function applyClauseCountChange(nextCount) {
      clauseCount = nextCount;
      normalizeStateAfterResize(nextCount);
      clauseCountSlider.value = String(nextCount);
      clauseCountValue.textContent = String(nextCount);
      reviewModalShown = false;
      structureCollapsed = false;
      renderAll();
    }

    function maybeUpdateClauseCount(nextCount) {
      if (nextCount === clauseCount) return;
      if (nextCount < clauseCount) {
        const removedClauseEdited = Array.from({ length: clauseCount - nextCount }, (_, offset) => nextCount + offset)
          .some(index => clauseHasEdits(index));
        const removedConnectorEdited = Array.from({ length: Math.max(0, connectingDevices.length - Math.max(0, nextCount - 1)) }, (_, offset) => Math.max(0, nextCount - 1) + offset)
          .some(index => connectorHasEdits(index));
        const removedEdited = removedClauseEdited || removedConnectorEdited;
        if (removedEdited) {
          const confirmed = window.confirm(`若繼續，系統只會保留前 ${nextCount} 個子句容器，後面的已編輯內容都會被移除。要繼續嗎？`);
          if (!confirmed) {
            clauseCountSlider.value = String(clauseCount);
            clauseCountValue.textContent = String(clauseCount);
            return;
          }
        }
      }
      applyClauseCountChange(nextCount);
    }

    function rebuildAnalysis() {
      tokens = tokenizeChinese(sentenceInput.value);
      initializeClauseData(clauseCount);
      reviewModalShown = false;
      structureCollapsed = false;
      renderAll();
      structureSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function resetSentence() {
      sentenceInput.value = defaultSentence;
      tokens = [];
      clauseCount = Number(clauseCountSlider.value);
      initializeClauseData(clauseCount);
      reviewModalShown = false;
      structureCollapsed = false;
      renderAll();
      
    }

    function renderAll() {
      updateSentencePreview();
      clauseCountValue.textContent = String(clauseCount);
      updateStructureVisibility();
      renderClauseGrid();
      renderTabs();
      renderStepPanel();
    }

    clauseCountSlider.addEventListener('input', () => {
      pendingClauseCount = Number(clauseCountSlider.value);
      clauseCountValue.textContent = String(pendingClauseCount);
    });

    clauseCountSlider.addEventListener('change', () => {
      maybeUpdateClauseCount(Number(clauseCountSlider.value));
    });

    tokenizeBtn.addEventListener('click', rebuildAnalysis);
    resetSentenceBtn.addEventListener('click', resetSentence);
    sentenceInput.addEventListener('input', updateSentencePreview);
    clearTranslationBtn.addEventListener('click', () => {
      translationInput.value = '';
    });
    document.querySelectorAll('[data-help-key]').forEach(btn => {
      btn.addEventListener('click', () => openHelpModal(btn.dataset.helpKey));
    });
    helpModalCloseBtn.addEventListener('click', closeHelpModal);
    helpModal.addEventListener('click', event => {
      if (event.target === helpModal) closeHelpModal();
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') closeHelpModal();
    });
    toggleStructureBtn.addEventListener('click', () => {
      structureCollapsed = !structureCollapsed;
      updateStructureVisibility();
    });
    reviewBackBtn.addEventListener('click', hideReviewModal);
    sentenceStructureInput.addEventListener('input', updateReviewConfirmButtonState);
    reviewConfirmBtn.addEventListener('click', () => {
      translationInput.value = sentenceStructureInput.value.trim();
      floatingEditor.dataset.expanded = 'true';
      document.body.classList.remove('editor-collapsed');
      toggleEditorBtn.textContent = '收合編輯器';
      reviewModalShown = true;
      structureCollapsed = true;
      hideReviewModal();
      renderAll();
    });
    subjectModalCancelBtn.addEventListener('click', hideSubjectModal);
    subjectModalApplyBtn.addEventListener('click', () => {
      clauseTextOverrides[activeClauseIndex] = subjectClauseInput.value.trim();
      assignments[activeClauseIndex] = createRoleState();
      activeRoleIndex = 0;
      hideSubjectModal();
      renderTabs();
      renderStepPanel();
    });

    toggleEditorBtn.addEventListener('click', () => {
      const expanded = floatingEditor.dataset.expanded === 'true';
      floatingEditor.dataset.expanded = String(!expanded);
      document.body.classList.toggle('editor-collapsed', expanded);
      toggleEditorBtn.textContent = expanded ? '展開編輯器' : '收合編輯器';
    });

    tabScroll.addEventListener('scroll', () => {
      window.clearTimeout(scrollTimer);
      scrollTimer = window.setTimeout(syncActiveClauseFromScroll, 80);
    });

    tokens = [];
    initializeClauseData(clauseCount);
    renderAll();
  </script>
</body>
</html>
